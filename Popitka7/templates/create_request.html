<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNET</title>
</head>
<body>
    <h1>Новая заявка</h1>
    <a href="/profile">Назад</a> 

    <form method="post">
        Курс: 
        <select name="course">
            {%for c in courses%}
            <option value="{{c}}"> {{c}}</option>
            {%endfor%}
        </select> <br>

        <input type="date" name="date" required><br>

        Способ оплаты: 
        <select name="payment">
            {%for p in payments%}
            <option value="{{p}}"> {{p}}</option>
            {%endfor%}
        </select> <br>
        <button type="submit">Потвердить</button>
    </form>
</body>
</html>
