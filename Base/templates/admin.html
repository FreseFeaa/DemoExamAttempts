<!DOCTYPE html>
<html>
<head><title>Админ-панель</title></head>
<body>
    <h2>Все заявки</h2>
    <a href="/logout">Выйти</a>
    <table border="1">
        <tr>
            <th>ID</th><th>Пользователь</th><th>Курс</th><th>Дата</th><th>Оплата</th><th>Статус</th><th>Отзыв</th><th>Действие</th>
        </tr>
        {% for r in requests %}
        <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.login }} ({{ r.fullname }})</td>
            <td>{{ r.course_name }}</td>
            <td>{{ r.start_date }}</td>
            <td>{{ r.payment_method }}</td>
            <td>{{ r.status }}</td>
            <td>{{ r.review or '' }}</td>
            <td>
                <form method="post" action="/admin/change_status">
                    <input type="hidden" name="request_id" value="{{ r.id }}">
                    <select name="status">
                        <option value="Новая" {% if r.status == 'Новая' %}selected{% endif %}>Новая</option>
                        <option value="Идет обучение" {% if r.status == 'Идет обучение' %}selected{% endif %}>Идет обучение</option>
                        <option value="Обучение завершено" {% if r.status == 'Обучение завершено' %}selected{% endif %}>Завершено</option>
                    </select>
                    <button type="submit">Изменить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
