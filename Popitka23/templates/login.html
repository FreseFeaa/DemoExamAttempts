<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles.css">
    <title>KorokNET</title>
</head>
<body>
    <h1>Вход</h1>

    </form>
    <p>Еще нет акка? <a href="/register">Регистрация</a></p>
</body>
</html>
