<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNET</title>
</head>
<body>
        <a href="/profile"> Назад</a>
        <h1>Новая форма</h1>

        <form method="post">
            Курс: 
            <select name="course">
                {%for c in courses%}
                <option value="{{c}}">{{c}}</option>
                {%endfor%}
            </select> <br>
            Дата старта: <input type="date" name="date" required><br>
            <select name="payment">
                {%for p in payments%}
                <option value="{{p}}">{{p}}</option>
                {%endfor%}
            </select> <br>
            <button type="submit">Потвердить</button>
        </form>


</body>
</html>
