<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css"> 
    <title>KorokNET</title>
</head>
<body>
    <div class="base">
        <h1>Новая заявка</h1>
        <a href="/profile">Назад</a>

        <form  method="post">
            Курс: <select name="course">
                {% for c in courses%}
                    <option value="{{c}}">{{c}}</option>
                {%endfor%}
            </select> <br>
            
            Дата старта: <input type="date" name="date" required> <br>

            Способ оплаты: <select name="payment">
                {% for p in payments%}
                    <option value="{{p}}">{{p}}</option>
                {%endfor%}
            </select> <br>
            <button type="submit">Потвердить</button>
        </form>
        
    </div>
</body>
</html>
