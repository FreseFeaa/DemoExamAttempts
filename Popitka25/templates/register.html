<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KorokNET</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h1>Регистрация</h1>
    {%if error%}
    <p class="error">{{error}}</p>
    {%endif%}

<form method="post">
  Логин: <input type="text" name="login" value="{{login}}" required> <br>
  Пароль: <input type="password" name="password"  required> <br>
  ФИО: <input type="text" name="fio" value="{{fio}}" required> <br>
  Почта: <input type="text" name="email" value="{{email}}" required> <br>
  Телефон: <input type="text" name="phone" value="{{phone}}" required> <br>
  <button type="submit">Потвердить</button>
</form>

<p> Уже есть акк? <a href="/login">Войти</a></p>

</body>
</html>
