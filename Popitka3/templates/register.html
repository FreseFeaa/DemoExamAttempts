<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNET</title>
</head>
<body>
    <h1>Регистрация</h1>
    {%if error%}
    <p style="color:red">{{error}}</p>
    {%endif%}

    <form method="post">
        Логин: <input name="login" type="text" required> <br>
        Пароль: <input name="password" type="password" required><br>
        ФИО: <input name="fio" type="text" required><br>
        Почта: <input name="email" type="text" required><br>
        Телефон: <input name="phone" type="text" required><br>

        <button type="submit">Потвердить</button><br>
    </form>
<p> Уже есть акк? <a href="/login">Войти</a></p>
</body>
</html>
