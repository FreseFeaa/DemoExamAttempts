</head>
<body>
    <h1>Регистрация</h1>
    {%if error%}
    <p style="color:red">{{erorr}}</p>
    {% endif%}

    <form method="post">

        <button type="submit">Зарегистрироваться</button>
    </form>
    <p>Есть акк? <a href="/login">Войти</a></p>
